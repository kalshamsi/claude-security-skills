# FIXTURE: Insecure Nginx configuration
#
# This file intentionally contains HTTP security header misconfigurations
# for use by the security-headers-audit skill test suite.
#
# Issues present (do NOT use in production):
#   - No Content-Security-Policy header
#   - No Strict-Transport-Security header
#   - No X-Frame-Options header
#   - No X-Content-Type-Options header
#   - No Referrer-Policy header
#   - No Permissions-Policy header
#   - server_tokens not disabled — Nginx version disclosed in Server header
#   - Wildcard CORS on API location
#   - No proxy_hide_header for upstream Server header
#   - No Cache-Control on API proxy location

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ----------------------------------------------------------------
    # ISSUE 1: server_tokens not disabled
    # Nginx will send: Server: nginx/1.18.0 (Ubuntu)
    # CWE-200 | A05:2021 — version disclosure
    # Fix: server_tokens off;
    # ----------------------------------------------------------------
    # Missing: server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ----------------------------------------------------------------
    # Main HTTPS server — missing all security headers
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name example.com www.example.com;

        ssl_certificate     /etc/nginx/ssl/example.com.crt;
        ssl_certificate_key /etc/nginx/ssl/example.com.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root /var/www/html;
        index index.html;

        # ----------------------------------------------------------------
        # ISSUE 2: No Content-Security-Policy header
        # CWE-693 | A05:2021 — XSS mitigation absent
        # Fix: add_header Content-Security-Policy "default-src 'self'; ..." always;
        # ----------------------------------------------------------------

        # ----------------------------------------------------------------
        # ISSUE 3: No Strict-Transport-Security header
        # CWE-319 | A02:2021 — HTTP downgrade possible on first visit
        # Fix: add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        # ----------------------------------------------------------------

        # ----------------------------------------------------------------
        # ISSUE 4: No X-Frame-Options header
        # CWE-1021 | A05:2021 — clickjacking risk
        # Fix: add_header X-Frame-Options "DENY" always;
        # ----------------------------------------------------------------

        # ----------------------------------------------------------------
        # ISSUE 5: No X-Content-Type-Options header
        # CWE-16 | A05:2021 — MIME sniffing attacks possible
        # Fix: add_header X-Content-Type-Options "nosniff" always;
        # ----------------------------------------------------------------

        # ----------------------------------------------------------------
        # ISSUE 6: No Referrer-Policy header
        # CWE-200 | A01:2021 — full URL leaked to external sites
        # Fix: add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # ----------------------------------------------------------------

        # ----------------------------------------------------------------
        # ISSUE 7: No Permissions-Policy header
        # CWE-250 | A01:2021 — browser features unrestricted
        # Fix: add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # ----------------------------------------------------------------

        location / {
            try_files $uri $uri/ =404;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            # Note: the security headers above are missing even for static assets
        }
    }

    # ----------------------------------------------------------------
    # API reverse proxy server — additional misconfigurations
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name api.example.com;

        ssl_certificate     /etc/nginx/ssl/api.example.com.crt;
        ssl_certificate_key /etc/nginx/ssl/api.example.com.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # ----------------------------------------------------------------
        # ISSUE 8: Wildcard CORS on API subdomain
        # CWE-942 | A05:2021 — any origin can read API responses
        # Fix: use a map{} block with an explicit origin allowlist
        # ----------------------------------------------------------------
        location /api/ {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';

            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # ----------------------------------------------------------------
            # ISSUE 9: No proxy_hide_header for upstream Server header
            # The upstream application (e.g., Node.js/Express) will leak
            # its own Server header through the proxy
            # CWE-200 | A05:2021
            # Fix: proxy_hide_header Server;
            #      proxy_hide_header X-Powered-By;
            # ----------------------------------------------------------------

            # ----------------------------------------------------------------
            # ISSUE 10: No Cache-Control on proxied API responses
            # Sensitive API data may be cached by intermediary proxies or CDN
            # CWE-524 | A04:2021
            # Fix: add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
            # ----------------------------------------------------------------
        }

        # Sensitive user data endpoint — no caching protection
        location /api/user/ {
            proxy_pass http://backend_upstream;
            # No Cache-Control header — user PII may be cached
        }

        # Strict-Transport-Security missing on this API subdomain server block
        # CWE-319 | A02:2021 — API HSTS not enforced
    }

    # HTTP server — redirects to HTTPS but no HSTS set here
    server {
        listen 80;
        server_name example.com www.example.com api.example.com;
        return 301 https://$host$request_uri;
    }

    upstream backend_upstream {
        server 127.0.0.1:3000;
        keepalive 32;
    }
}
