# Nginx reverse proxy for SaaS Dashboard
# Sits in front of the Express API and Next.js frontend

upstream dashboard_api {
    server 127.0.0.1:3000;
}

upstream dashboard_frontend {
    server 127.0.0.1:3001;
}

server {
    listen 443 ssl http2;
    server_name app.dashboard.io;

    ssl_certificate     /etc/ssl/certs/dashboard.crt;
    ssl_certificate_key /etc/ssl/private/dashboard.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # --- Security Headers ---

    # VULNERABILITY [Check 3 - Weak HSTS]: max-age is only 1 day (86400).
    # Subtle: HSTS IS present (not missing), but the max-age is far below
    # the recommended minimum of 1 year (31536000). Preload requires
    # >= 1 year. This also lacks includeSubDomains.
    add_header Strict-Transport-Security "max-age=86400" always;

    # VULNERABILITY [Check 4 - Missing X-Content-Type-Options]:
    # This header is simply absent from the Nginx config. The Express
    # app sets it via Helmet, but Nginx's proxy_hide_header might strip it.
    # (No add_header X-Content-Type-Options line)

    # VULNERABILITY [Check 5 - Missing X-Frame-Options]:
    # Relying solely on CSP frame-ancestors (set in Express). No X-Frame-Options
    # header at the Nginx layer for browsers that don't support CSP level 2.
    # (No add_header X-Frame-Options line)

    # VULNERABILITY [Check 6 - Missing Referrer-Policy]:
    # No Referrer-Policy header set at all. Default browser behavior
    # (strict-origin-when-cross-origin in modern browsers) may leak
    # URL paths containing tokens or session IDs to third parties.
    # (No add_header Referrer-Policy line)

    # Server header is left as default
    # VULNERABILITY [Check 9 overlap - Server header]: Nginx exposes its
    # version by default. server_tokens should be set to off.
    # (server_tokens directive is missing)

    # --- Proxy to API ---

    location /api/ {
        proxy_pass http://dashboard_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Strip upstream security headers to avoid duplicates
        # (but this also strips headers the upstream set correctly)
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
    }

    # --- Proxy to Frontend ---

    location / {
        proxy_pass http://dashboard_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Static assets ---

    location /static/ {
        alias /var/www/dashboard/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Note: add_header in a location block clears ALL parent add_header
        # directives — meaning HSTS is NOT applied to static assets.
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name app.dashboard.io;
    return 301 https://$host$request_uri;
}
