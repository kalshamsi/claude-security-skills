# Deliberately insecure docker-compose.yml — used as a test fixture for docker-scout-scanner
# DO NOT use in production. Every issue here is intentional.

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Issue: privileged mode gives the container near-unrestricted host access
    # Equivalent to --privileged; bypasses all Linux capability restrictions
    privileged: true
    # Issue: host network mode — container shares the host network namespace,
    # disabling network isolation entirely
    network_mode: host
    # Issue: no resource limits — container can consume unlimited CPU and memory,
    # enabling denial-of-service against the host
    # (deploy.resources.limits intentionally omitted)
    environment:
      # Issue: hardcoded secrets in compose environment (CWE-798, A07)
      DB_PASSWORD: hunter2
      API_TOKEN: sk-live-abcdef123456
      SECRET_KEY: my-super-secret-key
    ports:
      - "0.0.0.0:22:22"   # SSH exposed on all interfaces
      - "0.0.0.0:5432:5432" # Database port exposed to the world
    volumes:
      # Issue: mounting sensitive host paths gives the container read access to
      # the Docker socket (full host control) and /etc (host credentials)
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc:/host-etc:ro
      - /root:/host-root

  db:
    # Issue: latest tag on database image — CWE-1104, A06
    image: postgres:latest
    # Issue: no resource limits on database container
    environment:
      # Issue: hardcoded database credentials — CWE-798, A07
      POSTGRES_PASSWORD: password123
      POSTGRES_USER: admin
    ports:
      # Issue: database port bound to all interfaces (0.0.0.0), not just localhost
      - "0.0.0.0:5432:5432"
    volumes:
      # Issue: host path volume without explicit permissions
      - /tmp/pgdata:/var/lib/postgresql/data

  # Issue: no healthcheck on either service (compose-level health checks omitted)
